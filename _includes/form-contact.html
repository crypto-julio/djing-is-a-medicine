        <form class="newsletter-form reveal" id="contactForm" novalidate>
          <input type="hidden" name="locale" value="fr">
          <fieldset style="border:none;padding:0;margin:0;">
            <legend class="sr-only">Tes coordonnées</legend>
            <div class="newsletter-row">
              <label class="sr-only" for="c-first-name">Ton prénom</label>
              <input type="text" class="newsletter-input" placeholder="Ton prénom" name="first_name" id="c-first-name" required>
              <label class="sr-only" for="c-last-name">Ton nom</label>
              <input type="text" class="newsletter-input" placeholder="Ton nom" name="last_name" id="c-last-name" required>
            </div>
            <div class="newsletter-row">
              <label class="sr-only" for="c-email">Ton email</label>
              <input type="email" class="newsletter-input" placeholder="Ton email" name="email" id="c-email" required>
              <label class="sr-only" for="c-phone">Ton téléphone</label>
              <input type="tel" class="newsletter-input" placeholder="Ton téléphone" name="phone" id="c-phone" required>
            </div>
          </fieldset>
          <fieldset style="border:none;padding:0;margin:0;">
            <legend class="sr-only">Ton message</legend>
            <label class="sr-only" for="c-subject">Sujet</label>
            <select class="newsletter-input newsletter-select" name="subject" id="c-subject" required>
              <option value="" disabled selected>Sujet</option>
              <option value="devenir-partenaire">Devenir partenaire</option>
              <option value="information-generale">Information générale</option>
            </select>
            <label class="sr-only" for="c-message">Ton message</label>
            <textarea class="newsletter-input newsletter-textarea" name="messageUser" id="c-message"
              placeholder="Ton message" rows="4" required></textarea>
          </fieldset>
          <label class="newsletter-checkbox-label">
            <input type="checkbox" name="newsletter_chk" value="true" checked>
            <span>Oui, je veux recevoir la newsletter</span>
          </label>
          <button type="submit" class="newsletter-submit" id="contactSubmit">Envoyer</button>
          <p class="newsletter-form-status" id="formStatus" role="alert" aria-live="polite"></p>
        </form>
        <p class="newsletter-disclaimer reveal reveal-delay-1">Pas de spam. Tes données restent confidentielles.</p>
