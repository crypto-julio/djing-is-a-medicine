<!--
  INCLUDE : Formulaire de pré-inscription formation (version complète)
  Utilisé sur : index.html, formation-dj-ecstatic-dance.html
  Champs : prénom, nom, email, téléphone, ville, niveau DJ, niveau espaces,
           origine, sujet, motivation (1-10), intention/message, newsletter
  Injecté par build.js entre les marqueurs FORM_FORMATION:START / FORM_FORMATION:END
  Les options des <select> et le texte du bouton sont modifiables.
-->
        <form class="newsletter-form reveal reveal-delay-3" id="contactForm" novalidate>
          <input type="hidden" name="locale" value="fr">
          <fieldset style="border:none;padding:0;margin:0;">
            <legend class="sr-only">Tes coordonnées</legend>
            <div class="newsletter-row">
              <label class="sr-only" for="i-first-name">Ton prénom</label>
              <input type="text" class="newsletter-input" placeholder="Ton prénom" name="first_name" id="i-first-name" required>
              <label class="sr-only" for="i-last-name">Ton nom</label>
              <input type="text" class="newsletter-input" placeholder="Ton nom" name="last_name" id="i-last-name" required>
            </div>
            <div class="newsletter-row">
              <label class="sr-only" for="i-email">Ton email</label>
              <input type="email" class="newsletter-input" placeholder="Ton email" name="email" id="i-email" required>
              <label class="sr-only" for="i-phone">Ton téléphone</label>
              <input type="tel" class="newsletter-input" placeholder="Ton téléphone" name="phone" id="i-phone" required>
            </div>
            <div class="newsletter-row">
              <label class="sr-only" for="i-city">Ta ville</label>
              <input type="text" class="newsletter-input" placeholder="Ta ville" name="city" id="i-city" required>
            </div>
          </fieldset>
          <fieldset style="border:none;padding:0;margin:0;">
            <legend class="sr-only">Ton profil</legend>
            <div class="newsletter-row">
              <label class="sr-only" for="i-levelDJ">As-tu déjà mixé ?</label>
              <select class="newsletter-input newsletter-select" name="levelDJ" id="i-levelDJ" required>
                <option value="" disabled selected>As-tu déjà mixé ?</option>
                <option value="jamais">Jamais</option>
                <option value="un peu">Un peu</option>
                <option value="souvent">Souvent</option>
              </select>
              <label class="sr-only" for="i-levelEspaces">As-tu déjà tenu un espace de danse libre ?</label>
              <select class="newsletter-input newsletter-select" name="levelEspaces" id="i-levelEspaces" required>
                <option value="" disabled selected>As-tu déjà tenu un espace de danse libre ?</option>
                <option value="jamais">Jamais</option>
                <option value="un peu">Un peu</option>
                <option value="souvent">Souvent</option>
              </select>
            </div>
            <div class="newsletter-row">
              <label class="sr-only" for="i-originUser">Comment as-tu trouvé ton chemin jusqu'ici ?</label>
              <select class="newsletter-input newsletter-select" name="originUser" id="i-originUser" required>
                <option value="" disabled selected>Comment as-tu trouvé ton chemin jusqu'ici ?</option>
                <option value="bouche-a-oreille">Bouche-à-oreille / Recommandation</option>
                <option value="reseaux-sociaux">Réseaux sociaux (Instagram, Facebook…)</option>
                <option value="recherche-internet">Recherche internet / Site web</option>
                <option value="evenement">Événement / Retraite / Atelier</option>
                <option value="podcast">Podcast / Vidéo / Article</option>
              </select>
              <label class="sr-only" for="i-subject">Sujet</label>
              <select class="newsletter-input newsletter-select" name="subject" id="i-subject" required>
                <option value="" disabled selected>Sujet</option>
                <option value="dj-holistique">Retraite formation DJ holistique</option>
                <option value="danses-48">D.A.N.S.E.S 48</option>
              </select>
            </div>
          </fieldset>
          <div class="motivation-field" id="motivationField" style="display:none;">
            <p class="motivation-label" id="motivationLabel">De 1 à 10, quel est ton degré de motivation à l'idée de faire la formation DJ Holistique ?</p>
            <div class="motivation-scale" role="group" aria-labelledby="motivationLabel">
              <input type="hidden" name="motivationDJ" id="motivationDJ" value="">
              <button type="button" class="motivation-btn" data-value="1">1</button>
              <button type="button" class="motivation-btn" data-value="2">2</button>
              <button type="button" class="motivation-btn" data-value="3">3</button>
              <button type="button" class="motivation-btn" data-value="4">4</button>
              <button type="button" class="motivation-btn" data-value="5">5</button>
              <button type="button" class="motivation-btn" data-value="6">6</button>
              <button type="button" class="motivation-btn" data-value="7">7</button>
              <button type="button" class="motivation-btn" data-value="8">8</button>
              <button type="button" class="motivation-btn" data-value="9">9</button>
              <button type="button" class="motivation-btn" data-value="10">10</button>
            </div>
          </div>
          <label class="sr-only" for="i-message">Ton intention / message</label>
          <textarea class="newsletter-input newsletter-textarea" name="messageUser" id="i-message"
            placeholder="Ton intention / message" rows="3" required></textarea>
          <label class="newsletter-checkbox-label">
            <input type="checkbox" name="newsletter_chk" value="true" checked>
            <span>Oui, je veux recevoir la newsletter</span>
          </label>
          <button type="submit" class="newsletter-submit" id="contactSubmit">Recevoir la brochure et le replay</button>
          <p class="newsletter-form-status" id="formStatus" role="alert" aria-live="polite"></p>
        </form>
        <p class="newsletter-disclaimer reveal reveal-delay-4">Pas de spam. Tes données restent confidentielles.</p>
