# ============================================================
# NETLIFY.TOML — Configuration de déploiement Netlify
# ============================================================
#
# Benjamin, ce fichier configure comment Netlify déploie le site.
# Il active la compression CSS/JS/images automatiquement.
#
# NE PAS MODIFIER — demande à Julien.
# ============================================================

[functions]
  directory = "netlify/functions"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ---- Redirects : anciennes URLs → nouvelles (SEO) ----
# Les fichiers sont maintenant nommés directement avec les slugs SEO.
# pretty_urls = true fait que /formation-dj-ecstatic-dance sert
# automatiquement formation-dj-ecstatic-dance.html (sans .html dans l'URL).
# On garde les 301 pour les anciennes URLs qui pourraient encore être
# indexées par Google ou partagées.

[[redirects]]
  from = "/formation.html"
  to = "/formation-dj-ecstatic-dance"
  status = 301

[[redirects]]
  from = "/ecstatic-dance.html"
  to = "/explications-ecstatic-dance"
  status = 301

[[redirects]]
  from = "/a-propos.html"
  to = "/eotim-dj-holistique"
  status = 301

[[redirects]]
  from = "/politique-confidentialite"
  to = "/mentions-legales"
  status = 301

[[redirects]]
  from = "/politique-confidentialite.html"
  to = "/mentions-legales"
  status = 301
